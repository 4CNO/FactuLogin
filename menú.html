<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú — FactuLogin</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="has-sidebar page-transition">

<!-- Sidebar -->
<nav class="sidebar">
    <span class="sidebar-logo">FactuLogin</span>
    <a href="menú.html"      class="sidebar-link active"><i class="fa-solid fa-house"></i><span class="sidebar-label">Inicio</span></a>
    <a href="clientes.html"  class="sidebar-link"><i class="fa-solid fa-users"></i><span class="sidebar-label">Clientes</span></a>
    <a href="empresas.html"  class="sidebar-link"><i class="fa-solid fa-building"></i><span class="sidebar-label">Empresas</span></a>
    <a href="productos.html" class="sidebar-link"><i class="fa-solid fa-box"></i><span class="sidebar-label">Productos</span></a>
    <a href="pedidos.html"   class="sidebar-link"><i class="fa-solid fa-receipt"></i><span class="sidebar-label">Pedidos</span></a>
</nav>

<!-- Modal foto -->
<div class="profile-modal-overlay" id="profileModal">
    <img id="profileModalImg" class="profile-modal-img" src="" alt="Foto ampliada">
</div>

<!-- Toasts -->
<div class="toast-container" id="toastContainer"></div>

<div class="container">
    <div class="topbar">
        <h2>Panel principal</h2>
        <div class="topbar-actions">
            <button id="notifBtn" class="icon-btn" title="Notificaciones">
                <i class="fa-regular fa-bell"></i>
                <span id="notifCount" class="notif-count">0</span>
            </button>
            <div class="user-box">
                <button id="userBtn" class="user-btn">
                    <img id="profilePreview" class="profile-mini" alt="Perfil"
                         src="https://ui-avatars.com/api/?name=U&background=e0e7ff&color=4f46e5&size=80">
                    <span id="userNameLabel">Mi cuenta</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
                <div id="userDropdown" class="dropdown hidden">
                    <p><strong id="dropdownUserName">Usuario</strong></p>
                    <p id="dropdownUserEmail" class="muted-text">—</p>
                    <hr>
                    <label for="profileInput" class="menu-action" style="cursor:pointer;">
                        <i class="fa-regular fa-image" style="margin-right:6px;"></i>Cambiar foto
                    </label>
                    <input type="file" id="profileInput" accept="image/*">
                    <button id="viewInvoicesBtn" class="menu-action">
                        <i class="fa-regular fa-file-lines" style="margin-right:6px;"></i>Mis facturas
                    </button>
                    <button id="logoutBtn" class="menu-action danger">
                        <i class="fa-solid fa-right-from-bracket" style="margin-right:6px;"></i>Cerrar sesión
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="notifPanel" class="panel hidden">
        <h3>Notificaciones</h3>
        <ul id="notifList"></ul>
    </div>
    <div id="invoicePanel" class="panel hidden">
        <h3>Mis facturas</h3>
        <ul id="invoiceList"></ul>
    </div>

    <!-- Hero -->
    <div class="form hero-card">
        <div class="hero-logo-ring">
            <i class="fa-solid fa-file-invoice-dollar hero-icon"></i>
        </div>
        <h1 class="hero-title">FactuLogin</h1>
        <p class="hero-subtitle">Sistema de facturación moderno</p>
        <div class="hero-divider"></div>
        <p class="hero-hint">
            <i class="fa-solid fa-bars" style="margin-right:6px;opacity:0.5;"></i>
            Usa la barra lateral para navegar entre módulos
        </p>
    </div>
</div>

<script src="DATA/Scrips/utils.js"  defer></script>
<script src="DATA/Scrips/menu.js"   defer></script>
</body>
</html>
