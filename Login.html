<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactuLogin — Acceso</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <button class="tab active" id="tab-login">Iniciar sesión</button>
                <button class="tab"        id="tab-register">Registrarse</button>
            </div>

            <div class="auth-body">

                <!-- Panel Login -->
                <form class="form form-active" id="form-login" novalidate>
                    <h2>Bienvenido</h2>

                    <div id="login-error" class="error-msg" style="display:none;"></div>

                    <div class="input-group">
                        <label for="login-correo">Correo</label>
                        <input type="email" id="login-correo" autocomplete="email" required>
                    </div>
                    <div class="input-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" autocomplete="current-password" required>
                    </div>

                    <button type="submit" class="btn-primary" id="login-btn">Ingresar</button>

                    <p class="switch-text">
                        ¿No tienes cuenta?
                        <button type="button" class="link-button" id="go-register">Regístrate</button>
                    </p>
                </form>

                <!-- Panel Registro -->
                <form class="form" id="form-register" novalidate>
                    <h2>Crea tu cuenta</h2>

                    <div id="register-error" class="error-msg" style="display:none;"></div>
                    <div id="register-ok"    class="ok-msg"    style="display:none;"></div>

                    <div class="input-group">
                        <label for="reg-nombre">Nombre</label>
                        <input type="text" id="reg-nombre" autocomplete="name" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-correo">Correo</label>
                        <input type="email" id="reg-correo" autocomplete="email" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Contraseña</label>
                        <input type="password" id="reg-password" autocomplete="new-password" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-confirmar">Confirmar contraseña</label>
                        <input type="password" id="reg-confirmar" autocomplete="new-password" required>
                    </div>

                    <button type="submit" class="btn-primary" id="register-btn">Registrarse</button>

                    <p class="switch-text">
                        ¿Ya tienes cuenta?
                        <button type="button" class="link-button" id="go-login">Inicia sesión</button>
                    </p>
                </form>

            </div>
        </div>
    </div>

    <script src="DATA/Scrips/login.js" defer></script>
</body>
</html>
