<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos — FactuLogin</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="has-sidebar page-transition">

<nav class="sidebar">
    <span class="sidebar-logo">FactuLogin</span>
    <a href="menú.html"      class="sidebar-link"><i class="fa-solid fa-house"></i><span class="sidebar-label">Inicio</span></a>
    <a href="clientes.html"  class="sidebar-link"><i class="fa-solid fa-users"></i><span class="sidebar-label">Clientes</span></a>
    <a href="empresas.html"  class="sidebar-link"><i class="fa-solid fa-building"></i><span class="sidebar-label">Empresas</span></a>
    <a href="productos.html" class="sidebar-link"><i class="fa-solid fa-box"></i><span class="sidebar-label">Productos</span></a>
    <a href="pedidos.html"   class="sidebar-link active"><i class="fa-solid fa-receipt"></i><span class="sidebar-label">Pedidos</span></a>
</nav>

<div class="toast-container" id="toastContainer"></div>
<a href="menú.html" class="back-menu-btn">← Menú</a>

<div class="container form-centered">
    <div class="form">
        <h2>Pedidos</h2>

        <div id="pedido-error" class="error-msg" style="display:none;"></div>
        <div id="pedido-ok"    class="ok-msg"    style="display:none;"></div>

        <div class="input-group">
            <label>Cliente</label>
            <select id="clientePedido"><option value="">Seleccionar cliente</option></select>
        </div>
        <div class="input-group">
            <label>Empresa</label>
            <select id="empresaPedido"><option value="">Seleccionar empresa</option></select>
        </div>

        <hr style="margin:16px 0 8px;">
        <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:8px;">
            Agregar producto al pedido
            <span style="font-size:.78rem;opacity:.7;">· 2.5% desc. por cada 10 unidades</span>
        </p>

        <div class="input-group">
            <label>Producto</label>
            <select id="productoPedido"><option value="">Seleccionar producto</option></select>
        </div>
        <div class="input-group">
            <label>Cantidad</label>
            <input type="number" id="cantidadProducto" min="1" placeholder="Ej: 12">
        </div>

        <div class="descuento-row">
            <span id="descuentoBadge" class="descuento-badge" style="display:none;">
                <i class="fa-solid fa-tag"></i>
                <span id="descuentoTexto"></span>
            </span>
        </div>

        <button id="agregarBtn">+ Agregar al pedido</button>

        <hr style="margin:20px 0;">

        <table>
            <thead>
                <tr>
                    <th>Producto</th><th>Cant.</th><th>Precio unit.</th>
                    <th>Desc.</th><th>Subtotal</th><th></th>
                </tr>
            </thead>
            <tbody id="detalleBody"></tbody>
        </table>
        <p id="detalleEmpty" class="link">Aún no hay productos en el pedido</p>

        <h3 id="totalLabel" style="margin-top:15px;text-align:right;">Total: $0.00</h3>
        <button id="generarBtn" style="margin-top:10px;">Generar pedido 🧾</button>
    </div>
</div>

<script src="DATA/Scrips/utils.js"   defer></script>
<script src="DATA/Scrips/pedidos.js" defer></script>
</body>
</html>
