<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos — FactuLogin</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="has-sidebar page-transition">

<nav class="sidebar">
    <span class="sidebar-logo">FactuLogin</span>
    <a href="menú.html"      class="sidebar-link"><i class="fa-solid fa-house"></i><span class="sidebar-label">Inicio</span></a>
    <a href="clientes.html"  class="sidebar-link"><i class="fa-solid fa-users"></i><span class="sidebar-label">Clientes</span></a>
    <a href="empresas.html"  class="sidebar-link"><i class="fa-solid fa-building"></i><span class="sidebar-label">Empresas</span></a>
    <a href="productos.html" class="sidebar-link active"><i class="fa-solid fa-box"></i><span class="sidebar-label">Productos</span></a>
    <a href="pedidos.html"   class="sidebar-link"><i class="fa-solid fa-receipt"></i><span class="sidebar-label">Pedidos</span></a>
</nav>

<div class="toast-container" id="toastContainer"></div>
<a href="menú.html" class="back-menu-btn">← Menú</a>

<div class="container form-centered">
    <div class="form">
        <h2>Productos</h2>

        <div class="search-bar">
            <div class="search-input-wrap">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="number" id="buscarId" placeholder="Buscar por ID de producto…" min="1" autocomplete="off">
                <button id="btnBuscar" class="search-btn">Buscar</button>
            </div>
            <span id="searchStatus" class="search-status"></span>
        </div>

        <div id="modoIndicador" class="modo-badge modo-nuevo">
            <i class="fa-solid fa-plus-circle"></i> Modo: Nuevo producto
        </div>

        <div id="producto-error" class="error-msg" style="display:none;"></div>
        <div id="producto-ok"    class="ok-msg"    style="display:none;"></div>

        <div class="input-group" id="idGroup" style="display:none;">
            <label>ID de producto <span class="field-hint">(asignado automáticamente)</span></label>
            <input type="number" id="productoId" readonly>
        </div>

        <div class="input-group">
            <label>Nombre del producto</label>
            <input type="text" id="nombreProducto" placeholder="Ej: Camiseta básica">
        </div>
        <div class="input-group">
            <label>Marca</label>
            <input type="text" id="marcaProducto" placeholder="Ej: Nike">
        </div>
        <div class="input-group">
            <label>Precio unitario</label>
            <input type="number" id="precioProducto" min="0" step="0.01" placeholder="Ej: 59900">
        </div>
        <div class="input-group">
            <label>Cantidad en bodega</label>
            <input type="number" id="cantidadProducto" min="0" step="1" placeholder="Ej: 100">
        </div>

        <div class="btn-row">
            <button id="saveProductoBtn">
                <i class="fa-solid fa-floppy-disk" style="margin-right:6px;"></i>
                <span id="saveBtnText">Guardar producto</span>
            </button>
            <button id="clearBtn" class="btn-secondary" title="Limpiar formulario">
                <i class="fa-solid fa-rotate-left"></i>
            </button>
        </div>

        <hr style="margin:20px 0;">

        <table>
            <thead>
                <tr><th>ID</th><th>Producto</th><th>Marca</th><th>Precio</th><th>Bodega</th></tr>
            </thead>
            <tbody id="productosBody"></tbody>
        </table>
        <p id="productosEmpty" class="link">Aún no hay productos</p>
    </div>
</div>

<script src="DATA/Scrips/utils.js"     defer></script>
<script src="DATA/Scrips/productos.js" defer></script>
</body>
</html>
